# =============================================================================
# Caddy Production Configuration for TLS Termination (F-09)
# =============================================================================
# Put this file in your server at /etc/caddy/Caddyfile and run `systemctl reload caddy`
#
# This setup automatically handles obtaining and renewing Let's Encrypt certificates,
# redirects all HTTP traffic to HTTPS, and reverse-proxies to the Python server.
# =============================================================================

your-domain.com {
    # ── TLS Configuration ──
    # Caddy gets and renews TLS certificates automatically
    tls admin@your-domain.com

    # ── Security Headers ──
    header {
        # Prevent Clickjacking (X-Frame-Options)
        X-Frame-Options "DENY"
        # Prevent MIME type sniffing
        X-Content-Type-Options "nosniff"
        # HSTS (Strict-Transport-Security) — force HTTPS for 1 year
        Strict-Transport-Security "max-age=31536000; includeSubDomains; preload"
        # Referrer Policy
        Referrer-Policy "no-referrer-when-downgrade"
    }

    # ── Reverse Proxy ──
    # Forward all traffic to the dashboard server running on localhost port 8502
    reverse_proxy 127.0.0.1:8502 {
        # Inform the backend server of the original client IP and scheme
        header_up X-Real-IP {remote_host}
        header_up X-Forwarded-Proto {scheme}
    }
}
